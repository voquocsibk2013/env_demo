<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Environmental Aspects Toolkit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }

      /* ── Light theme (default) ─────────────────────────────────────────── */
      :root {
        --bg:          #F5F3EE;
        --surface:     #FFFFFF;
        --surface2:    #FAFAF8;
        --text:        #1A1C1E;
        --muted:       #6B7280;
        --faint:       #9CA3AF;
        --border:      #DDD9D0;
        --row-bd:      #F0EDE6;
        --teal:        #0F6E56;
        --teal-bg:     #E1F5EE;
        --teal-bd:     #9FE1CB;
        --teal-dk:     #085041;
        --teal-hi:     #1D9E75;
        --red:         #A32D2D;
        --red-bg:      #FCEBEB;
        --red-bd:      #F09595;
        --amber:       #856404;
        --amber-bg:    #FFFBE6;
        --amber-bd:    #FFD700;
        --green:       #27500A;
        --green-bg:    #EAF3DE;
        --green-bd:    #97C459;
        --purple:      #3C3489;
        --purple-bg:   #EEEDFE;
        --purple-bd:   #AFA9EC;
        --blue:        #0C447C;
        --blue-bg:     #E6F1FB;
        --blue-bd:     #85B7EB;
        --slate:       #455A64;
        --slate-bg:    #ECEFF1;
        --slate-bd:    #B0BEC5;
        --sb-bg:       #EAE7DF;
        --sb-bg2:      #DEDBD3;
        --sb-bd:       #CBC7BF;
        --sb-text:     #1A1C1E;
        --sb-muted:    #4B5563;
        --sb-faint:    #9CA3AF;
        --sb-sig:      #FCEBEB;
        --sb-sig-text: #A32D2D;
        --cat-teal-bg: #E0F2F1; --cat-teal-bd: #80CBC4; --cat-teal-tx: #004D40; --cat-teal-hd: #00695C;
        --cat-purple-bg:#EDE7F6;--cat-purple-bd:#CE93D8;--cat-purple-tx:#4527A0;--cat-purple-hd:#6A1B9A;
        --cat-amber-bg: #FFF8E1;--cat-amber-bd: #FFE082;--cat-amber-tx: #E65100;--cat-amber-hd: #F57F17;
        --cat-red-bg:   #FFEBEE;--cat-red-bd:   #EF9A9A;--cat-red-tx:   #B71C1C;--cat-red-hd:   #C62828;
        --cat-green-bg: #E8F5E9;--cat-green-bd: #A5D6A7;--cat-green-tx: #1B5E20;--cat-green-hd: #2E7D52;
        --cat-blue-bg:  #E3F2FD;--cat-blue-bd:  #90CAF9;--cat-blue-tx:  #0D47A1;--cat-blue-hd:  #1565C0;
        --cat-gray-bg:  #ECEFF1;--cat-gray-bd:  #CFD8DC;--cat-gray-tx:  #37474F;--cat-gray-hd:  #455A64;
      }

      /* ── Dark theme ─────────────────────────────────────────────────────── */
      [data-theme="dark"] {
        --bg:          #0F1117;
        --surface:     #1A1D26;
        --surface2:    #151821;
        --text:        #E2DFD8;
        --muted:       #7C8190;
        --faint:       #4A4E5A;
        --border:      #252830;
        --row-bd:      #1E2028;
        --teal:        #1D9E75;
        --teal-bg:     #081E16;
        --teal-bd:     #0F6E56;
        --teal-dk:     #5DCAA5;
        --teal-hi:     #5DCAA5;
        --red:         #E24B4A;
        --red-bg:      #1A0808;
        --red-bd:      #7B2020;
        --amber:       #FFD700;
        --amber-bg:    #1A1800;
        --amber-bd:    #A08000;
        --green:       #97C459;
        --green-bg:    #0A1505;
        --green-bd:    #3B6D11;
        --purple:      #AFA9EC;
        --purple-bg:   #10101F;
        --purple-bd:   #534AB7;
        --blue:        #85B7EB;
        --blue-bg:     #070F1A;
        --blue-bd:     #1565C0;
        --slate:       #8B8F9A;
        --slate-bg:    #1A1D26;
        --slate-bd:    #252830;
        --sb-bg:       #0D1117;
        --sb-bg2:      #141820;
        --sb-bd:       #1E222C;
        --sb-text:     #F8F8F8;
        --sb-muted:    #B0BAC8;
        --sb-faint:    #6B7A8D;
        --sb-sig:      #3D0808;
        --sb-sig-text: #E24B4A;
        --cat-teal-bg: #081E16; --cat-teal-bd: #0F6E56; --cat-teal-tx: #5DCAA5; --cat-teal-hd: #1D9E75;
        --cat-purple-bg:#10101F;--cat-purple-bd:#534AB7;--cat-purple-tx:#AFA9EC;--cat-purple-hd:#7F77DD;
        --cat-amber-bg: #1A1006;--cat-amber-bd: #7A4F0A;--cat-amber-tx: #FAC775;--cat-amber-hd: #EF9F27;
        --cat-red-bg:   #1A0808;--cat-red-bd:   #7B2020;--cat-red-tx:   #F09595;--cat-red-hd:   #E24B4A;
        --cat-green-bg: #0A1505;--cat-green-bd: #3B6D11;--cat-green-tx: #C0DD97;--cat-green-hd: #639922;
        --cat-blue-bg:  #070F1A;--cat-blue-bd:  #1565C0;--cat-blue-tx:  #85B7EB;--cat-blue-hd:  #378ADD;
        --cat-gray-bg:  #1A1D26;--cat-gray-bd:  #252830;--cat-gray-tx:  #8B8F9A;--cat-gray-hd:  #5F5E5A;
      }

      /* ── Global resets ──────────────────────────────────────────────────── */
      input, select, textarea {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 10px;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      input:focus, select:focus, textarea:focus { border-color: var(--teal); }
      select option { background: var(--surface); color: var(--text); }
      button { cursor: pointer; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
